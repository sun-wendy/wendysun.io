<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="/styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300&display=swap" rel="stylesheet">
</head>
<body class="main-content">
    <header class="section sec1 header active" id="about">
        <div class="header-content">
            <div class="left-header">
                <div class="h-shape"></div>
                <div class="profile-img">
                    <img src="/images/profile_img.jpg" alt="Profile Image" height="350">
                </div>
            </div>
            <div class="right-header">
                <h1 class="intro">
                    Hello
                </h1>
                <p>
                    Hello, here's an intro
                </p>
            </div>
        </div>
    </header>

    <main>
        <section class="section sec2 research" id="research"></section>
        <section class="section sec3 projects" id="projects"></section>
    </main>

    <div class="menu">
        <div class="control control-1 active-btn" data-id="about">
            <i class="fa-regular fa-address-card"></i>
        </div>
        <div class="control control-2" data-id="research">
            <i class="fa-solid fa-laptop"></i>
        </div>
        <div class="control control-3" data-id="projects">
            <i class="fa-solid fa-bars-progress"></i>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
